apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: demo-h1
spec:
  devices:
    requests:
    - name: partition
      exactly:
        deviceClassName: dra-cpu-dra-memory-gpu-nvidia-com-half-numa0
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: demo-h2
spec:
  devices:
    requests:
    - name: partition
      exactly:
        deviceClassName: dra-cpu-dra-memory-gpu-nvidia-com-half-numa1
---
apiVersion: v1
kind: Pod
metadata:
  name: demo-half-1
spec:
  containers:
  - name: test
    image: registry.k8s.io/pause:3.9
    resources:
      claims:
      - name: partition
  resourceClaims:
  - name: partition
    resourceClaimName: demo-h1
  tolerations:
  - operator: Exists
---
apiVersion: v1
kind: Pod
metadata:
  name: demo-half-2
spec:
  containers:
  - name: test
    image: registry.k8s.io/pause:3.9
    resources:
      claims:
      - name: partition
  resourceClaims:
  - name: partition
    resourceClaimName: demo-h2
  tolerations:
  - operator: Exists
