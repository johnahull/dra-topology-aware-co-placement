{{- $drivers := list }}
{{- if .Values.cpu.enabled }}{{ $drivers = append $drivers "dracpu" }}{{ end }}
{{- if .Values.memory.enabled }}{{ $drivers = append $drivers "dramemory" }}{{ end }}
{{- if .Values.sriov.enabled }}{{ $drivers = append $drivers "dra-sriov" }}{{ end }}
{{- range $name := $drivers }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "dra-topology-drivers.labels" $ | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "dra-topology-drivers.labels" $ | nindent 4 }}
rules:
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceslices"]
  verbs: ["get","list","watch","create","update","patch","delete"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims"]
  verbs: ["get","list","watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get","list","watch"]
{{- if eq $name "dra-sriov" }}
- apiGroups: ["sriovnetwork.k8snetworkplumbingwg.io"]
  resources: ["sriovresourcepolicies"]
  verbs: ["get","list","watch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "dra-topology-drivers.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
