{{- if .Values.memory.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dramemory
  namespace: {{ .Release.Namespace }}
  labels:
    app: dramemory
    {{- include "dra-topology-drivers.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: dramemory
  template:
    metadata:
      labels:
        app: dramemory
    spec:
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
      serviceAccountName: dramemory
      containers:
      - name: dramemory
        image: {{ .Values.memory.image.repository }}:{{ .Values.memory.image.tag }}
        imagePullPolicy: {{ .Values.memory.image.pullPolicy }}
        args:
        - --hostname-override=$(NODE_NAME)
        - --v={{ .Values.memory.verbosity }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        volumeMounts:
        - name: plugins
          mountPath: /var/lib/kubelet/plugins
        - name: plugins-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: cdi
          mountPath: /var/run/cdi
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: nri
          mountPath: /var/run/nri
      volumes:
      - name: plugins
        hostPath:
          path: /var/lib/kubelet/plugins
      - name: plugins-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: cdi
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: sys
        hostPath:
          path: /sys
      - name: nri
        hostPath:
          path: /var/run/nri
{{- end }}
