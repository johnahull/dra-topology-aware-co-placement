        count: 1
        selectors:
        - cel:
            expression: 'device.attributes["dra.net"].numaNode == 1'
---
apiVersion: v1
kind: Pod
metadata:
  name: q0
  namespace: test
spec:
  containers:
  - name: w
    image: registry.access.redhat.com/ubi9/ubi-minimal:latest
    command: ["/bin/sleep", "infinity"]
  resourceClaims:
  - name: d
    resourceClaimName: q0
