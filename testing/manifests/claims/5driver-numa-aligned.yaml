# 5-driver NUMA-aligned allocation: GPU + NVMe + NIC + CPU + Memory
# All devices constrained to the same NUMA node via a single matchAttribute.
# Requires: GPU, NVMe, SR-IOV, CPU, and memory DRA drivers deployed.
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: 5driver-numa-claim
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
      - name: nvme
        exactly:
          deviceClassName: dra.nvme
          selectors:
          - cel:
              expression: "device.attributes[\"dra.nvme\"].model != \"Dell_BOSS-N1\""
      - name: nic
        exactly:
          deviceClassName: sriovnetwork.k8snetworkplumbingwg.io
      - name: cpu
        exactly:
          deviceClassName: dra.cpu
      - name: mem
        exactly:
          deviceClassName: dra.memory
      constraints:
      - matchAttribute: resource.kubernetes.io/numaNode
        requests: [gpu, nvme, nic, cpu, mem]
---
apiVersion: v1
kind: Pod
metadata:
  name: 5driver-numa-test
spec:
  terminationGracePeriodSeconds: 5
  containers:
  - name: test
    image: registry.access.redhat.com/ubi9/ubi-minimal:latest
    command: ["sleep", "3600"]
    resources:
      claims:
      - name: devices
  resourceClaims:
  - name: devices
    resourceClaimTemplateName: 5driver-numa-claim
