apiVersion: v1
kind: ConfigMap
metadata:
  name: cpu-numa-rule
  namespace: nodepartition
  labels:
    nodepartition.dra.k8s.io/topology-rule: "true"
data:
  attribute: dra.cpu/numaNodeID
  type: int
  driver: dra.cpu
  mapsTo: numaNode
  partitioning: group
---
apiVersion: v1
kind: ConfigMap
metadata:
