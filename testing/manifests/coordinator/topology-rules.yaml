  labels:
    nodepartition.dra.k8s.io/topology-rule: "true"
data:
  attribute: dra.net/numaNode
  type: int
  driver: sriovnetwork.k8snetworkplumbingwg.io
  mapsTo: numaNode
  partitioning: group
---
