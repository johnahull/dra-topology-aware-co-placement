# R760xa SR-IOV setup
#
# Create NIC VFs:
#   echo 2 | sudo tee /sys/class/net/enp55s0np0/device/sriov_numvfs  # CX7, NUMA 0
#   echo 2 | sudo tee /sys/class/net/ens7f0np0/device/sriov_numvfs   # CX6Dx, NUMA 1
#
# Deploy SR-IOV DRA driver:
#   kubectl apply -f dra-sriov-driver.yaml
#   (or via Helm — see below)
#
# Then apply this policy for Mellanox VF discovery:
apiVersion: sriovnetwork.k8snetworkplumbingwg.io/v1alpha1
kind: SriovResourcePolicy
metadata:
  name: mellanox-policy
  namespace: kube-system
spec:
  configs:
  - resourceFilters:
    - vendors: ["15b3"]
      drivers: ["vfio-pci", "mlx5_core"]
