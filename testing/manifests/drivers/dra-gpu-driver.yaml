apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-dra-driver
  namespace: amd-gpu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-dra-driver
rules:
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceslices"]
  verbs: ["get","list","watch","create","update","patch","delete"]
- apiGroups: ["resource.k8s.io"]
  resources: ["resourceclaims"]
  verbs: ["get","list","watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-dra-driver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-dra-driver
subjects:
- kind: ServiceAccount
  name: gpu-dra-driver
  namespace: amd-gpu
---
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: gpu.amd.com
spec:
  selectors:
  - cel:
      expression: "device.driver == \"gpu.amd.com\""
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-dra-driver
  namespace: amd-gpu
  labels:
    app: gpu-dra-driver
spec:
  selector:
    matchLabels:
      app: gpu-dra-driver
  template:
    metadata:
      labels:
        app: gpu-dra-driver
    spec:
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
        effect: NoSchedule
      serviceAccountName: gpu-dra-driver
      initContainers:
      - name: driver-init
        image: busybox:1.36
        command: ["sh", "-c", "while [ ! -d /host-sys/module/amdgpu/drivers/ ]; do echo waiting for amdgpu; sleep 2; done"]
        volumeMounts:
        - name: sys
          mountPath: /host-sys
      containers:
      - name: plugin
        image: localhost/k8s-gpu-dra-driver:latest
        imagePullPolicy: Never
        args:
        - gpu-kubeletplugin
        - --node-name=$(NODE_NAME)
        - --v=4
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
        ports:
        - name: health
          containerPort: 51515
        livenessProbe:
          grpc:
            port: 51515
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: plugins
          mountPath: /var/lib/kubelet/plugins
        - name: plugins-registry
          mountPath: /var/lib/kubelet/plugins_registry
        - name: cdi
          mountPath: /var/run/cdi
        - name: dev
          mountPath: /dev
        - name: sys
          mountPath: /sys
      volumes:
      - name: plugins
        hostPath:
          path: /var/lib/kubelet/plugins
      - name: plugins-registry
        hostPath:
          path: /var/lib/kubelet/plugins_registry
      - name: cdi
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: dev
        hostPath:
          path: /dev
      - name: sys
        hostPath:
          path: /sys
